<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wildstyle Radio — Live Chat</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/chat.css?v=4">
</head>
<body>

  <div class="chat-custom-layout">
    <div class="chat-main-card">
      
      <div class="chat-card-status">
        <span class="live-dot">•</span> LIVE NOW
      </div>

      <h1 class="chat-card-title">Wildstyle Social Chat</h1>
      <div class="chat-card-meta">Free</div>

      <p class="chat-card-desc">
        Join DJs, listeners, chatbox for requests & shoutouts, competitions, events and the Wildstyle community in one place.
      </p>

      <div class="chat-stats-row">
        <div class="chat-stat-item">
          <strong class="highlight-pink">24/7</strong>
          <span>Radio</span>
        </div>
        <div class="chat-stat-item">
          <strong class="highlight-pink">20+</strong>
          <span>DJs</span>
        </div>
        <div class="chat-stat-item">
          <strong class="highlight-pink" id="live-listener-count">0</strong>
          <span>Listeners</span>
        </div>
      </div>

    </div>

    <div class="chat-embed-panel">
      <iframe
        src="https://minnit.chat/c/WildstyleRadio?embed&nickname="
        title="Wildstyle Live Chat"
        loading="lazy"
        allow="camera; microphone"
        data-minnitchatembed="1">
      </iframe>
    </div>
  </div>

<script>
  function updateLiveListeners() {
    const listenerNode = document.getElementById("live-listener-count");
    if (!listenerNode) return;

    const oldScript = document.getElementById("live365-jsonp-node");
    if (oldScript) oldScript.remove();

    window.handleLive365Stats = function(data) {
      if (data && typeof data.current_listeners !== "undefined") {
        listenerNode.innerText = data.current_listeners;
      } else {
        listenerNode.innerText = "0";
      }
    };

    const script = document.createElement("script");
    script.id = "live365-jsonp-node";
    script.src = "https://api.live365.com/station/a50378?callback=handleLive365Stats";
    
    script.onerror = function() {
      listenerNode.innerText = "0";
    };

    document.body.appendChild(script);
  }

  document.addEventListener("DOMContentLoaded", () => {
    updateLiveListeners();
    setInterval(updateLiveListeners, 40000);
  });
</script>

</body>
</html>
