<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildstyle Player Full Width</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: system-ui, sans-serif;
  }

  /* MAIN PLAYER */
  .player-wrap {
    width: 100%;
    max-width: 100%;
    height: 200px; /* YOUR REQUEST */
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 233, 255, 0.4);
    padding: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
	
  }

  .brand {
    font-size: 1rem;
    background: linear-gradient(90deg, #ff00ff, #00eaff);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }

  .now-playing-text {
    font-size: 0.85rem;
    min-height: 1rem;
    text-align: center;
    margin-bottom: 6px;
  }

  /* CIRCLE */
  .circle-shell {
    width: 110px;
    height: 110px;
    position: relative;
  }

  .circle-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(#ff007a, #ff8a00, #ffe600, #00ffea, #007bff, #ff00ff);
    animation: spin 9s linear infinite;
    filter: blur(1.2px);
  }

  .circle-inner {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at center, #111229, #000);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .play-btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00eaff, #007bff);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 0 10px #00eaff;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Bottom Controls */
  .controls-row {
    display: flex;
    gap: 15px;
    margin-top: 8px;
  }

  .ctrl-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 0.85rem;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,255,255,0.4);
  }
  .socials {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.social-btn {
  padding: 10px 18px;
  border-radius: 30px;
  font-weight: 600;
  font-size: 0.9rem;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.fb { background: #1877f2; box-shadow: 0 0 10px #1877f2; }
.ig { background: #e1306c; box-shadow: 0 0 10px #e1306c; }
</style>
</head>

<body>

<div class="player-wrap">

  <div class="brand">Wildstyle Radio</div>

  <div class="now-playing-text" id="nowPlayingText">Loading…</div>

  <div class="circle-shell">
    <div class="circle-outer"></div>
    <div class="circle-inner">
      <button class="play-btn" id="playButton">▶</button>
    </div>
  </div>

  <div class="controls-row">
    <div class="ctrl-btn" id="volDown">🔉</div>
    <div class="ctrl-btn" id="muteBtn">🔇</div>
    <div class="ctrl-btn" id="volUp">🔊</div>
  </div>
<!-- Add font awesome icons -->
<a href="https://facebook.com/wildstyleuk" class="fa fa-facebook">facebook</a>
<a href="https://instagram.com/wildstyle_radio" class="fa fa-instagram">Instagram</a>
<div id="listenerCounter" style="margin-top:8px; color:#00ffff; font-weight:bold; text-align:center;">
  🌍 Listeners from your country: 0
</div>

<div id="listenerCountry" style="margin-top:6px; color:#ffffff; text-align:center;">
  🌍 Listener from: Detecting...
</div> 
</div>

<audio id="radioAudio">
  <source src="https://streaming.live365.com/a50378" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("radioAudio");
const playBtn = document.getElementById("playButton");
const nowPlayingText = document.getElementById("nowPlayingText");
const listenerCounter = document.getElementById("listenerCounter");
const listenerCountry = document.getElementById("listenerCountry");

let hasReported = false;
let detectedCountry = "Unknown Country";

// GET VISITOR COUNTRY
async function getCountry() {
  try {
    const res = await fetch("https://ipwho.is/");
    const data = await res.json();

    detectedCountry = data.country || "Unknown Country";

    if (listenerCountry) {
      listenerCountry.textContent = `🌍 Listener from: ${detectedCountry}`;
    }

    return detectedCountry;
  } catch (err) {
    console.log("Country detection failed:", err);
    detectedCountry = "Unknown Country";

    if (listenerCountry) {
      listenerCountry.textContent = "🌍 Listener from: Unknown Country";
    }

    return detectedCountry;
  }
}

// REPORT WEBSITE LISTENER COUNTRY
async function reportListener() {
  try {
    const country = await getCountry();

    await fetch("https://wildstyle-geo.jayaubs89.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ country: country })
    });

    updateListenerCounter(country);
  } catch (err) {
    console.log("Geo reporting failed:", err);
  }
}

// FETCH CURRENT COUNTRY COUNT
async function getCountry() {
  try {
    if (listenerCountry) {
      listenerCountry.textContent = "🌍 Listener from: Detecting...";
    }

    const res = await fetch("https://wildstyle-geo.jayaubs89.workers.dev/country");
    const data = await res.json();

    const countryMap = {
      GB: "United Kingdom",
      US: "United States",
      IE: "Ireland",
      CA: "Canada",
      AU: "Australia",
      IN: "India",
      DE: "Germany",
      ES: "Spain",
      ZA: "South Africa",
      NG: "Nigeria",
      TT: "Trinidad and Tobago",
      MY: "Malaysia",
      MT: "Malta",
      KE: "Kenya",
      FI: "Finland",
      NO: "Norway",
      SE: "Sweden",
      CH: "Switzerland",
      PR: "Puerto Rico"
    };

    detectedCountry = countryMap[data.country] || data.country || "Unknown Country";

    if (listenerCountry) {
      listenerCountry.textContent = "🌍 Listener from: " + detectedCountry;
    }

    return detectedCountry;
  } catch (err) {
    console.log("Country detection failed:", err);
    detectedCountry = "Unknown Country";

    if (listenerCountry) {
      listenerCountry.textContent = "🌍 Listener from: Unknown Country";
    }

    return detectedCountry;
  }
} 


// PLAY / PAUSE BUTTON
playBtn.addEventListener("click", async () => {
  if (audio.paused) {
    try {
      await audio.play();
      playBtn.textContent = "⏸";
    } catch (err) {
      console.log("Audio play failed:", err);
    }
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
});

// TRIGGER reportListener WHEN AUDIO ACTUALLY STARTS
audio.addEventListener("play", async () => {
  if (!hasReported) {
    await reportListener();
    hasReported = true;
  }
});

// If paused manually, switch button back
audio.addEventListener("pause", () => {
  if (!audio.ended) {
    playBtn.textContent = "▶";
  }
});

// VOLUME CONTROLS
document.getElementById("volUp").onclick = () => {
  audio.volume = Math.min(1, audio.volume + 0.1);
};

document.getElementById("volDown").onclick = () => {
  audio.volume = Math.max(0, audio.volume - 0.1);
};

document.getElementById("muteBtn").onclick = () => {
  audio.muted = !audio.muted;
};

// NOW PLAYING FETCH
async function fetchNowPlaying() {
  try {
    const api = "https://public.api.live365.com/station/a50378";
    const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(api);
    const res = await fetch(proxy);
    const data = await res.json();
    const json = JSON.parse(data.contents);

    const title = json?.now_playing?.title || "Unknown";
    const artist = json?.now_playing?.artist || "";

    nowPlayingText.innerHTML = `<b>${title}</b><br><small>${artist}</small>`;
  } catch {
    nowPlayingText.textContent = "Track unavailable";
  }
}

// Show country even before pressing play
getCountry();

fetchNowPlaying();
setInterval(fetchNowPlaying, 15000);
</script> 


</body>
</html>
