<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wildstyle Radio - Schedule</title>
  <link rel="stylesheet" href="/test/style.css">
  <link rel="stylesheet" href="/test/schedule.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Left Sidebar (Desktop Navigation Panel) -->
  <aside class="sidebar">
    <div class="logo-area">
      <img src="/images/wildy.png" alt="Wildstyle Logo" class="nav-logo">
      <span class="brand-name">Wildstyle Radio</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html">Home</a>
      <a href="djs.html">DJs</a>
      <a class="active" href="schedule.html">Schedule</a>
      <a href="noticeboard.html">Noticeboard</a>
      <a href="chat.html">Chat</a>
      <a href="fans.html">Fans Of Wildstyle</a>
      <a href="support.html">Support Wildstyle</a>
      <a href="map.html">Map</a>
      <a href="about.html">About Us</a>
    </nav>
  </aside>

  <!-- Main Grid Content Wrapper -->
  <main class="content">

    <!-- Top Navigation Utility Bar -->
    <header class="topbar">
      <!-- Mobile View Hamburger Menu Trigger Button -->
      <button class="mobile-menu-toggle" id="mobileMenuBtn" aria-label="Toggle Menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <div class="search-box">
        <input type="text" placeholder="Search DJs, Shows...">
      </div>

      <div class="socials">
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
      </div>

      <a href="listen.html" class="listen-btn">Listen Live</a>
    </header>


   <!-- <section class="hero">
      <div class="hero-head">
        <span>Wildstyle Schedule</span>
        <span class="hero-pill">Live Shows • Weekly Timetable</span>
      </div>
      <div class="hero-copy">
        <span class="hero-kicker">🎧 WHAT'S ON AIR</span>
        <h1 id="heroShowName">Loading...</h1>
        <p id="heroShowTime">Loading...</p>
      </div>
      <div class="hero-card">
        <img id="heroDJ" src="/images/wildy.png" alt="Current DJ" class="schedule-hero-image">
      </div>
    </section> -->

    <section class="day-tabs">
      <button class="active">Monday</button>
      <button>Tuesday</button>
      <button>Wednesday</button>
      <button>Thursday</button>
      <button>Friday</button>
      <button>Saturday</button>
      <button>Sunday</button>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Weekly Schedule</h2>
        <span>Live Shows & Open Slots</span>
      </div>
      <div class="section-body">
        <div id="liveSchedulelist" class="schedule-grid-wrapper"></div>
      </div>
    </section>

    <section class="featured-dj">
      <div class="featured-dj-card">
        <img id="wildyDjImage" src="/images/wildy.png" alt="Recommended DJ">
        <div class="featured-dj-content">
          <span class="featured-tag">🐺 WILDY RECOMMENDS</span>
          <h2 id="wildyDjName">Loading...</h2>
          <p id="wildyDjText">Loading recommendation...</p>
          <div id="wildyDjTime" class="featured-meta">Loading...</div>
        </div>
      </div>
    </section>

  </main>

  <script src="/test/schedule.js"></script>
</body>
</html>
