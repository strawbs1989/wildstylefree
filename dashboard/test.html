<html>
<body>

<!-- ======================================================
     LISTENER SPOTLIGHT
====================================================== -->

<section class="card listener-spotlight">

  <div class="card-head">
    <h2>🏆 Listener Spotlight</h2>
    <span class="badge">Latest Nomination</span>
  </div>

  <div class="card-body">

    <!-- Latest Nomination -->
    <div id="latestNomination" class="spotlight-card">

      <div class="spotlight-avatar">
        👤
      </div>

      <div class="spotlight-info">

        <h3 id="spotlightName">
          No nominations yet
        </h3>

        <p id="spotlightReason">
          Be the first to nominate someone who deserves recognition in the Wildstyle community.
        </p>

        <small id="spotlightBy">
          Waiting for the first nomination...
        </small>

      </div>

    </div>

    <hr>

    <!-- Nomination Form -->

    <h3>Nominate a Listener</h3>

    <p>
      Tell us who deserves recognition and why.
    </p>

    <input
      type="text"
      id="nomineeName"
      placeholder="Listener name">

    <textarea
      id="nomineeReason"
      rows="4"
      placeholder="Why should they be nominated?"></textarea>

    <input
      type="text"
      id="nominatedBy"
      placeholder="Your name (optional)">

    <button id="submitNomination"
            class="btn-primary">
      Submit Nomination
    </button>

  </div>

</section>

<script>

const submitBtn = document.getElementById("submitNomination");

submitBtn.addEventListener("click", () => {

    const nominee =
        document.getElementById("nomineeName").value.trim();

    const reason =
        document.getElementById("nomineeReason").value.trim();

    const by =
        document.getElementById("nominatedBy").value.trim() || "Anonymous";

    if (!nominee || !reason) {
        alert("Please enter a listener name and reason.");
        return;
    }

    document.getElementById("spotlightName").textContent = nominee;

    document.getElementById("spotlightReason").textContent = reason;

    document.getElementById("spotlightBy").textContent =
        "Nominated by " + by;

    document.getElementById("nomineeName").value = "";
    document.getElementById("nomineeReason").value = "";
    document.getElementById("nominatedBy").value = "";

});

</script>

</html>
</body>
