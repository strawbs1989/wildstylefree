<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family:Inter, sans-serif;
      background:transparent;
      color:white;
    }

    .request-embed{
      padding:15px;
    }

    .request-form{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .request-form input{
      padding:10px;
      border-radius:10px;
      border:none;
      background:rgba(255,255,255,.08);
      color:white;
    }

    .request-form input::placeholder{
      color:#aaa;
    }

    .send-btn{
      padding:12px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,#ff2a6d,#7c3aed);
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .closed-box{
      text-align:center;
      padding:20px;
      border-radius:16px;
      background:linear-gradient(180deg,#17131f,#0f0d14);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-weight:700;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="request-embed">
    <form action="https://script.google.com/macros/s/AKfycbz4TY_tQZEsJflfzeKB8ALDR7aEDNVe6jjQhoGO-d8Rqv0Nr_yiIa2peKbC2-oaBZE/exec" method="post" class="request-form">
      <input type="text" name="yourname" placeholder="Your Name" required>
      <input type="text" name="songtitle" placeholder="Song Title" required>
      <input type="text" name="artistname" placeholder="Artist Name" required>
      <input type="text" name="shoutout" placeholder="Shout-out (optional)">
      <button type="submit" class="send-btn">Send Request</button>
    </form>
  </div>

  <script>
    const STATUS_URL = "https://script.google.com/macros/s/AKfycbz4TY_tQZEsJflfzeKB8ALDR7aEDNVe6jjQhoGO-d8Rqv0Nr_yiIa2peKbC2-oaBZE/exec";

    async function checkRequestStatus() {
      const form = document.querySelector(".request-form");
      if (!form) return;

      try {
        const res = await fetch(STATUS_URL);
        const data = await res.json();

        console.log("Request status:", data);

        if (!data.requests || String(data.requests).trim().toUpperCase() !== "ON") {
          form.outerHTML = `
            <div class="closed-box">
              🚫 Requests are currently CLOSED<br>
              Please check back later
            </div>
          `;
        }
      } catch (err) {
        console.log("Status check failed:", err);
      }
    }

    checkRequestStatus();
  </script>
</body>
</html>
